name: CI

on:
  push:
    branches: [main, "agent/**"]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: shambalens
          POSTGRES_PASSWORD: shambalens
          POSTGRES_DB: shambalens_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U shambalens -d shambalens_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: postgresql+asyncpg://shambalens:shambalens@localhost:5432/shambalens_test
      DATABASE_URL_UNPOOLED: postgresql+asyncpg://shambalens:shambalens@localhost:5432/shambalens_test
      DEMO_MODE: "true"
      AI_PROVIDER: groq
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - run: alembic upgrade head
      - run: ruff check .
      - run: mypy app
      - run: pytest

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e -- --project=chromium

  compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cp .env.example .env
      - run: docker compose config
